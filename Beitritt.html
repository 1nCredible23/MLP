<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beitritt</title>
</head>
<body>
    <style>
        body {
            background-color: white;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Communist_Hammer_and_Sickle_flag.svg/960px-Communist_Hammer_and_Sickle_flag.svg.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            color: black;
            font-style: italic;
            text-align: center;
        }

        a {
            font-size: 25px;
            color: darkblue;
        }

        a.hover {
            color: blue;
        }

        button {
            background-color: black;
            color: white;
            font-size: 20px;
            padding: 10;
            border-radius: 10px;
            margin: 20px;
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>

    <h1>Beitritt</h1>

   <form>
       <label for="name">Vollständiger Name:</label>
       <input type="text" id="name" name="name" placeholder="Hier eingeben..."></input>
   </form>

    <form>
       <label for="Alter">Alter:</label>
       <input type="text" id="Alter" placeholder="Hier eingeben..."></input>
   </form>

    <form>
       <label for="e-mail">E-Mail-Adresse:</label>
       <input type="text" id="E-Mail-Adresse" placeholder="Hier eingeben..."></input>
   </form>

    <form>
      <label for="Grund">Beitrittsgrund:</label>
      <textarea id="Grund" name="Beitrittsgrund" rows="4" cols="50" placeholder="Dein Grund für den Beitritt"></textarea>
    </form>

    <input type="checkbox" id="beitrag" name="Jahresbeitrag" value="akzeptiert">
    <label for="beitrag">Ich stimme zu den jährlichen Mitglieder-Beitrag von 5 CHF zu bezahlen.</label>

        <br></br>
    
    <input type="checkbox" id="Grundwerte" name="Grundwerte" value="akzeptiert">
    <label for="Grundwerte">Ich habe die Grundwerte der MLP gelesen und werde mich an sie halten.</label>

    <h2>Bitte fülle alle Felder aus, mache einen Screenshot und schicke ihn an info.marxismus.leninismus@gmail.com</h2>
    
    <button onclick="location.href='index.html'">MLP</button>
</body>
</html>
